<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Autorisation TikTok - Code recu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:system-ui,-apple-system,sans-serif;max-width:640px;margin:60px auto;padding:0 20px;line-height:1.6;color:#222}
textarea{width:100%;height:120px;font-family:monospace;font-size:14px;padding:10px}
button{padding:10px 16px;font-size:15px;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<h1>Autorisation recue</h1>
<p>Copie tout le texte ci-dessous et colle-le a Claude :</p>
<textarea id="out" readonly></textarea>
<br>
<button onclick="navigator.clipboard.writeText(document.getElementById('out').value)">Copier</button>
<script>
document.getElementById('out').value = window.location.href;
</script>
</body>
</html>
